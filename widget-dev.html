<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget Bootstrap Dev</title>
    <!-- Simulate a real hotel site background -->
    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        background: #f5f0eb;
        min-height: 100vh;
      }
      .fake-site {
        max-width: 900px;
        margin: 0 auto;
        padding: 60px 40px;
      }
      .fake-site h1 {
        font-size: 48px;
        font-weight: 300;
        color: #1c1917;
        margin-bottom: 16px;
      }
      .fake-site p {
        font-size: 16px;
        color: #78716c;
        line-height: 1.8;
        max-width: 540px;
      }
      .fake-nav {
        background: #1c1917;
        padding: 16px 40px;
        display: flex;
        gap: 32px;
        align-items: center;
      }
      .fake-nav span {
        color: #c9a96e;
        font-size: 18px;
        letter-spacing: 3px;
      }
      .fake-nav a {
        color: #78716c;
        font-family: sans-serif;
        font-size: 13px;
        text-decoration: none;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="fake-nav">
      <span>IMPERIAL</span>
      <a href="#">Rooms</a>
      <a href="#">Dining</a>
      <a href="#">Spa</a>
    </div>
    <div class="fake-site">
      <h1>A stay beyond<br />the ordinary</h1>
      <p>
        This page simulates a hotel website. The widget button appears
        bottom-right. Edit <code>src/widget-dev.tsx</code> and changes reload
        instantly.
      </p>
    </div>
    <div class="" style="height: 300vh"></div>

    <!-- Widget mounts via widget-dev.tsx (not the IIFE build) -->
    <div
      data-booking-widget
      data-hotel-name="The Himanshu"
      data-hotel-id="69b5a814b970ab623ecdb80c"
    ></div>
    <script type="module" src="dist/widget.js"></script>
  </body>
</html>
